# Model arguments
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
dataset_name: simplescaling/openaimath
dataset_prompt_column: problem
dataset_train_split: train
system_prompt: "You are a helpful AI Assistant that provides well-reasoned and detailed responses. You first think about the reasoning process as an internal monologue and then provide the user with the answer. Respond in the following format: <think>\n...\n</think>\n<answer>\n...\n</answer>"

# GRPO trainer config
beta: 0.0001
bf16: true
use_vllm: true
do_eval: false
gradient_accumulation_steps: 4
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
humanline: true
humanline_log_eps_P: -0.05
humanline_log_eps_R: 1.0
hub_model_id: kawine/Qwen2.5-1.5B-Instruct_humanline_64
hub_strategy: every_save
learning_rate: 1.0e-06
log_completions: true
log_level: info
logging_first_step: true
logging_steps: 1
logging_strategy: steps
loss_type: "dapo"
lr_scheduler_type: constant_with_warmup 
lr_scheduler_kwargs:
  min_lr_rate: 0.1
max_prompt_length: 512
max_completion_length: 2048
max_steps: 1600
num_generations: 8
num_train_epochs: 1
output_dir: data/Qwen2.5-1.5B-Instruct_humanline_64
overwrite_output_dir: true
per_device_eval_batch_size: 8 
per_device_train_batch_size: 8
push_to_hub: false
report_to:
- wandb
reward_funcs:
- accuracy
- format
- tag_count
reward_weights:
- 8.0
- 1.0
- 1.0
save_strategy: "steps"
save_steps: 400
save_total_limit: 5 
seed: 42
steps_per_generation: 256
temperature: 0.7
use_liger_kernel: false
warmup_ratio: 0.1
wandb_entity: kawin-ethayarajh
wandb_project: math
